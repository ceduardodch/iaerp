name: iaerp-staging

x-backend-environment: &backend-environment
  APP_ENV: staging
  AUTH_MODE: oidc
  DATABASE_URL: postgresql+asyncpg://iaerp:${POSTGRES_PASSWORD}@iaerp-staging-postgres:5432/iaerp
  OIDC_ISSUER_URL: https://iaerp-auth.b2b.com.ec/realms/iaerp
  OIDC_JWKS_URL: http://iaerp-staging-keycloak:8080/realms/iaerp/protocol/openid-connect/certs
  OIDC_API_AUDIENCE: iaerp-api
  OIDC_MCP_AUDIENCE: http://localhost:8000/mcp
  MCP_SERVER_URL: https://iaerp.b2b.com.ec/mcp
  OIDC_ADMIN_URL: http://iaerp-staging-keycloak:8080
  OIDC_ADMIN_REALM: iaerp
  OIDC_ADMIN_CLIENT_ID: iaerp-provisioner
  OIDC_ADMIN_CLIENT_SECRET: ${OIDC_ADMIN_CLIENT_SECRET}
  REDIS_URL: redis://iaerp-staging-redis:6379/0
  CORS_ORIGINS: https://iaerp.b2b.com.ec
  SRI_SIMULATOR_ENABLED: "true"
  SYNTHETIC_SEED_ENABLED: "true"
  MINIO_ENDPOINT: iaerp-staging-minio:9000
  MINIO_PUBLIC_ENDPOINT: iaerp-files.b2b.com.ec
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_SECURE: "true"
  IAERP_SIGNING_CERT_PATH: /home/iaerp/certs/test-signing.p12
  IAERP_SIGNING_CERT_PASSWORD: ${IAERP_SIGNING_CERT_PASSWORD}

services:
  postgres:
    container_name: iaerp-staging-postgres
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile.coolify
    restart: unless-stopped
    environment:
      POSTGRES_DB: iaerp
      POSTGRES_USER: iaerp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - iaerp-postgres-data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - iaerp-staging-postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=\"$$POSTGRES_PASSWORD\" psql -h 127.0.0.1 -U iaerp -d iaerp -c 'SELECT 1' >/dev/null && PGPASSWORD=\"$$KEYCLOAK_DB_PASSWORD\" psql -h 127.0.0.1 -U keycloak -d keycloak -c 'SELECT 1' >/dev/null"
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4.5-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - iaerp-redis-data:/data
    networks:
      default:
        aliases:
          - iaerp-staging-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_SERVER_URL: https://iaerp-files.b2b.com.ec
    volumes:
      - iaerp-minio-data:/data
    ports:
      - "127.0.0.1:18219:9000"
    networks:
      default:
        aliases:
          - iaerp-staging-minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 30

  keycloak:
    build:
      context: ./infra/keycloak
      dockerfile: Dockerfile.coolify
    restart: unless-stopped
    command: start --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://iaerp-staging-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: https://iaerp-auth.b2b.com.ec
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "127.0.0.1:18218:8080"
    networks:
      default:
        aliases:
          - iaerp-staging-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep '200 OK' <&3"
        ]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 20s

  keycloak-config:
    build:
      context: ./infra/keycloak
      dockerfile: Dockerfile.coolify
    restart: "no"
    entrypoint: ["/bin/bash", "/opt/iaerp/configure-staging.sh"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KEYCLOAK_INTERNAL_URL: http://iaerp-staging-keycloak:8080
      PUBLIC_APP_URL: https://iaerp.b2b.com.ec
      OIDC_ADMIN_CLIENT_SECRET: ${OIDC_ADMIN_CLIENT_SECRET}
      IAERP_AGENT_NORTE_SECRET: ${IAERP_AGENT_NORTE_SECRET}
      IAERP_AGENT_SUR_SECRET: ${IAERP_AGENT_SUR_SECRET}
      IAERP_OWNER_PASSWORD: ${IAERP_OWNER_PASSWORD}
      IAERP_OPERATOR_NORTE_PASSWORD: ${IAERP_OPERATOR_NORTE_PASSWORD}
      IAERP_ACCOUNTANT_SUR_PASSWORD: ${IAERP_ACCOUNTANT_SUR_PASSWORD}
    networks:
      - default
    depends_on:
      keycloak:
        condition: service_healthy

  api:
    build:
      context: ./backend
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "uv run --no-sync alembic upgrade head && uv run --no-sync python -m app.initial_data && uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000"
      ]
    environment: *backend-environment
    volumes:
      - iaerp-signing-certs:/home/iaerp/certs
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak-config:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/startup')"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command:
      [
        "uv",
        "run",
        "--no-sync",
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "worker",
        "--loglevel=INFO"
      ]
    environment: *backend-environment
    volumes:
      - iaerp-signing-certs:/home/iaerp/certs
    networks:
      - default
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "python", "-m", "app.workers.health", "worker"]
      interval: 15s
      timeout: 8s
      retries: 10
      start_period: 20s

  scheduler:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "python", "-m", "app.workers.dispatcher"]
    environment: *backend-environment
    networks:
      - default
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "python", "-m", "app.workers.health", "dispatcher"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
        VITE_AUTH_MODE: oidc
        VITE_KEYCLOAK_URL: https://iaerp-auth.b2b.com.ec
        VITE_KEYCLOAK_REALM: iaerp
        VITE_KEYCLOAK_CLIENT_ID: iaerp-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:18217:8080"
    networks:
      - default
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  iaerp-postgres-data:
  iaerp-redis-data:
  iaerp-minio-data:
  iaerp-signing-certs:

networks:
  default: {}
