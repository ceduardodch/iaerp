name: iaerp

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: iaerp
      POSTGRES_USER: iaerp
      POSTGRES_PASSWORD: iaerp-local-only
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iaerp -d iaerp"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: iaerp-local
      MINIO_ROOT_PASSWORD: iaerp-local-password
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin-local-only
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak-local-only
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/iaerp-realm.json:/opt/keycloak/data/import/iaerp-realm.json:ro
    ports:
      - "8080:8080"
      - "9002:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep '200 OK' <&3"
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  api:
    build:
      context: ./backend
    command:
      [
        "sh",
        "-c",
        "uv run --no-sync alembic upgrade head && uv run --no-sync python -m app.initial_data && uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000"
      ]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://iaerp:iaerp-local-only@postgres:5432/iaerp
      AUTH_MODE: ${AUTH_MODE:-dev}
      DEV_JWT_SECRET: local-development-secret-change-before-shared-use
      OIDC_ISSUER_URL: http://localhost:8080/realms/iaerp
      OIDC_JWKS_URL: http://keycloak:8080/realms/iaerp/protocol/openid-connect/certs
      OIDC_API_AUDIENCE: iaerp-api
      OIDC_MCP_AUDIENCE: http://localhost:8000/mcp
      MCP_SERVER_URL: http://localhost:8000/mcp
      OIDC_ADMIN_URL: http://keycloak:8080
      OIDC_ADMIN_REALM: iaerp
      OIDC_ADMIN_CLIENT_ID: iaerp-provisioner
      OIDC_ADMIN_CLIENT_SECRET: local-only-provisioner-secret
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:8088,http://localhost:5173
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: iaerp-local
      MINIO_SECRET_KEY: iaerp-local-password
      IAERP_SIGNING_CERT_PATH: /home/iaerp/certs/test-signing.p12
      IAERP_SECRETS_ENCRYPTION_KEY: Chnh0BTHcgiUZgxx1SuuQRDd38NpYzxT8R0nMTLlh3M=
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ./backend
    command:
      [
        "uv",
        "run",
        "--no-sync",
        "celery",
        "-A",
        "app.workers.celery_app.celery_app",
        "worker",
        "--loglevel=INFO"
      ]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://iaerp:iaerp-local-only@postgres:5432/iaerp
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: iaerp-local
      MINIO_SECRET_KEY: iaerp-local-password
      IAERP_SIGNING_CERT_PATH: /home/iaerp/certs/test-signing.p12
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "--no-sync",
          "python",
          "-m",
          "app.workers.health",
          "worker"
        ]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 10s

  scheduler:
    build:
      context: ./backend
    command: ["uv", "run", "--no-sync", "python", "-m", "app.workers.dispatcher"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://iaerp:iaerp-local-only@postgres:5432/iaerp
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "--no-sync",
          "python",
          "-m",
          "app.workers.health",
          "dispatcher"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./frontend
      args:
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-dev}
        VITE_KEYCLOAK_URL: http://localhost:8080
    ports:
      - "8088:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:
