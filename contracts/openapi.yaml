openapi: 3.1.0
info:
  title: IAERP API
  version: 0.1.0-draft
  description: Contrato preliminar del MVP. El tenant activo se deriva del token.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.example.invalid/api/v1
security:
  - oauth2: []
paths:
  /context:
    get:
      operationId: getContext
      summary: Obtener tenant, permisos, limites y kill switch
      responses:
        "200":
          description: Contexto activo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantContext"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /parties:
    get:
      operationId: searchParties
      summary: Buscar clientes y proveedores
      parameters:
        - name: q
          in: query
          schema:
            type: string
            minLength: 2
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/PartyRole"
      responses:
        "200":
          description: Resultados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Party"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createParty
      summary: Crear cliente/proveedor
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyInput"
      responses:
        "201":
          description: Contacto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "409":
          $ref: "#/components/responses/Conflict"
  /products:
    get:
      operationId: searchProducts
      summary: Buscar productos
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resultados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createProduct
      summary: Crear producto
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /invoices:
    post:
      operationId: createInvoiceDraft
      summary: Crear borrador de factura
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Borrador
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesDocument"
        "422":
          $ref: "#/components/responses/ValidationError"
  /invoices/{invoiceId}:
    get:
      operationId: getInvoice
      summary: Consultar factura y estado SRI
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Factura
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesDocument"
        "404":
          $ref: "#/components/responses/NotFound"
  /invoices/{invoiceId}/issue:
    post:
      operationId: issueInvoice
      summary: Validar, firmar y encolar emision
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Emision aceptada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
  /credit-notes:
    post:
      operationId: createAndIssueCreditNote
      summary: Crear y encolar nota de credito relacionada
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditNoteInput"
      responses:
        "202":
          description: Operacion aceptada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /receivables:
    get:
      operationId: listReceivables
      summary: Consultar cartera
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, PARTIAL, OVERDUE, SETTLED]
        - name: dueBefore
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Cartera
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /receivables/{receivableId}/payments:
    post:
      operationId: recordCustomerPayment
      summary: Registrar y aplicar un cobro
      parameters:
        - $ref: "#/components/parameters/ReceivableId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Cobro registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /receivables/{receivableId}/reminders:
    post:
      operationId: sendCollectionReminder
      summary: Enviar recordatorio
      parameters:
        - $ref: "#/components/parameters/ReceivableId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderInput"
      responses:
        "202":
          description: Envio encolado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /payables:
    get:
      operationId: listPayables
      summary: Consultar obligaciones
      responses:
        "200":
          description: Obligaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createPayable
      summary: Crear obligacion manual
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayableInput"
      responses:
        "201":
          description: Obligacion creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /payables/from-document:
    post:
      operationId: createPayableFromDocument
      summary: Crear obligacion desde un objeto cargado
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [documentId]
              properties:
                documentId:
                  type: string
                  format: uuid
      responses:
        "202":
          description: Extraccion encolada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /payables/{payableId}/schedule:
    post:
      operationId: scheduleSupplierPayment
      summary: Programar pago sin mover dinero
      parameters:
        - $ref: "#/components/parameters/PayableId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentScheduleInput"
      responses:
        "201":
          description: Pago programado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /payables/{payableId}/payments:
    post:
      operationId: recordSupplierPayment
      summary: Registrar pago ya realizado
      parameters:
        - $ref: "#/components/parameters/PayableId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Pago registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.example.invalid/authorize
          tokenUrl: https://auth.example.invalid/token
          scopes:
            context:read: Leer contexto
            parties:read: Leer contactos
            parties:write: Gestionar contactos
            products:read: Leer productos
            products:write: Gestionar productos
            invoices:read: Leer facturas
            invoices:write: Crear y emitir documentos
            invoices:issue: Emitir facturas
            credit-notes:issue: Emitir notas de credito
            receivables:read: Leer cartera
            receivables:write: Registrar cobros y recordatorios
            receivables:notify: Enviar recordatorios
            payables:read: Leer obligaciones
            payables:write: Crear y pagar obligaciones
            payables:extract: Extraer obligaciones desde documentos
            finance:read: Leer resumen financiero
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReceivableId:
      name: receivableId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PayableId:
      name: payableId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Decimal:
      type: string
      pattern: "^-?[0-9]+(\\.[0-9]{1,6})?$"
      examples: ["125.50"]
    PartyRole:
      type: string
      enum: [CUSTOMER, SUPPLIER]
    TenantContext:
      type: object
      additionalProperties: false
      required: [tenantId, ruc, name, roles, scopes, automationWritesEnabled]
      properties:
        tenantId:
          type: string
          format: uuid
        ruc:
          type: string
          pattern: "^[0-9]{13}$"
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        automationWritesEnabled:
          type: boolean
    PartyInput:
      type: object
      additionalProperties: false
      required: [name, identificationType, identificationNumber, roles]
      properties:
        name:
          type: string
          minLength: 1
        identificationType:
          type: string
          enum: [RUC, CEDULA, PASSPORT, FINAL_CONSUMER]
        identificationNumber:
          type: string
        roles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/PartyRole"
        email:
          type: [string, "null"]
          format: email
        phone:
          type: [string, "null"]
        address:
          type: [string, "null"]
    Party:
      allOf:
        - $ref: "#/components/schemas/PartyInput"
        - type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid
    ProductInput:
      type: object
      additionalProperties: false
      required: [name, unitPrice, taxCode]
      properties:
        name:
          type: string
        code:
          type: [string, "null"]
        unitPrice:
          $ref: "#/components/schemas/Decimal"
        taxCode:
          type: string
    Product:
      allOf:
        - $ref: "#/components/schemas/ProductInput"
        - type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid
    InvoiceLineInput:
      type: object
      additionalProperties: false
      required: [description, quantity, unitPrice, taxCode]
      properties:
        productId:
          type: [string, "null"]
          format: uuid
        description:
          type: string
        quantity:
          $ref: "#/components/schemas/Decimal"
        unitPrice:
          $ref: "#/components/schemas/Decimal"
        discount:
          $ref: "#/components/schemas/Decimal"
        taxCode:
          type: string
    InvoiceInput:
      type: object
      additionalProperties: false
      required: [customerId, establishmentId, emissionPointId, issueDate, lines]
      properties:
        customerId:
          type: string
          format: uuid
        establishmentId:
          type: string
          format: uuid
        emissionPointId:
          type: string
          format: uuid
        issueDate:
          type: string
          format: date
        dueDate:
          type: [string, "null"]
          format: date
        lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InvoiceLineInput"
    CreditNoteInput:
      type: object
      additionalProperties: false
      required: [invoiceId, reason, lines]
      properties:
        invoiceId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 3
        lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InvoiceLineInput"
    SalesDocument:
      type: object
      additionalProperties: false
      required: [id, type, status, sequential, issueDate, subtotal, tax, total]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [INVOICE, CREDIT_NOTE]
        status:
          type: string
          enum: [DRAFT, READY, SIGNED, RECEIVED, PENDING_AUTHORIZATION, AUTHORIZED, REJECTED, FAILED, VOIDED]
        sequential:
          type: string
          pattern: "^[0-9]{9}$"
        issueDate:
          type: string
          format: date
        accessKey:
          type: [string, "null"]
          pattern: "^[0-9]{49}$"
        subtotal:
          $ref: "#/components/schemas/Decimal"
        tax:
          $ref: "#/components/schemas/Decimal"
        total:
          $ref: "#/components/schemas/Decimal"
    AccountItem:
      type: object
      additionalProperties: false
      required: [id, partyId, status, originalAmount, openAmount, currency]
      properties:
        id:
          type: string
          format: uuid
        partyId:
          type: string
          format: uuid
        status:
          type: string
          enum: [OPEN, PARTIAL, OVERDUE, SETTLED, VOIDED]
        originalAmount:
          $ref: "#/components/schemas/Decimal"
        openAmount:
          $ref: "#/components/schemas/Decimal"
        currency:
          type: string
          const: USD
        dueDate:
          type: [string, "null"]
          format: date
    PaymentInput:
      type: object
      additionalProperties: false
      required: [amount, paymentDate, method]
      properties:
        amount:
          $ref: "#/components/schemas/Decimal"
        paymentDate:
          type: string
          format: date
        method:
          type: string
          enum: [TRANSFER, CHECK, CASH, CARD, RETENTION, OTHER]
        reference:
          type: [string, "null"]
        retentionAmount:
          $ref: "#/components/schemas/Decimal"
        discountAmount:
          $ref: "#/components/schemas/Decimal"
    ReminderInput:
      type: object
      additionalProperties: false
      required: [channel, templateId]
      properties:
        channel:
          type: string
          enum: [EMAIL, WHATSAPP]
        templateId:
          type: string
          format: uuid
    PayableInput:
      type: object
      additionalProperties: false
      required: [supplierId, documentNumber, issueDate, dueDate, total]
      properties:
        supplierId:
          type: string
          format: uuid
        documentNumber:
          type: string
        accessKey:
          type: [string, "null"]
          pattern: "^[0-9]{49}$"
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        total:
          $ref: "#/components/schemas/Decimal"
    PaymentScheduleInput:
      type: object
      additionalProperties: false
      required: [scheduledDate, amount, priority]
      properties:
        scheduledDate:
          type: string
          format: date
        amount:
          $ref: "#/components/schemas/Decimal"
        priority:
          type: string
          enum: [LOW, NORMAL, HIGH, CRITICAL]
    Operation:
      type: object
      additionalProperties: false
      required: [operationId, status, correlationId]
      properties:
        operationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACCEPTED, RUNNING, SUCCEEDED, FAILED, BLOCKED]
        correlationId:
          type: string
    Error:
      type: object
      additionalProperties: false
      required: [code, message, correlationId]
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
  responses:
    Unauthorized:
      description: Token ausente, invalido o sin contexto autorizado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: No encontrado o no visible en el tenant
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflicto de estado, duplicado o idempotencia
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Datos invalidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
