openapi: 3.1.0
info:
  title: IAERP API
  version: 0.1.0-draft
  description: Contrato preliminar del MVP. El tenant activo se deriva del token.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.example.invalid/api/v1
security:
  - oauth2: []
paths:
  /context:
    get:
      operationId: getContext
      summary: Obtener tenant, permisos, limites y kill switch
      security:
        - oauth2: ["context:read"]
      responses:
        "200":
          description: Contexto activo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantContext"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /memberships:
    get:
      operationId: listOwnMemberships
      summary: Listar membresias activas del usuario
      security:
        - oauth2: ["memberships:read"]
      responses:
        "200":
          description: Membresias visibles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Membership"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /service-accounts:
    get:
      operationId: listServiceAccounts
      summary: Listar service accounts del tenant activo
      security:
        - oauth2: ["service-accounts:read"]
      responses:
        "200":
          description: Service accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createServiceAccount
      summary: Crear service account ligado al tenant activo
      security:
        - oauth2: ["service-accounts:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceAccountInput"
      responses:
        "201":
          description: Service account creado; el secreto solo se entrega una vez
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccountCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /service-accounts/{serviceAccountId}:
    delete:
      operationId: revokeServiceAccount
      summary: Revocar un service account del tenant activo
      security:
        - oauth2: ["service-accounts:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: serviceAccountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Service account revocado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /establishments:
    get:
      operationId: listEstablishments
      summary: Listar establecimientos del tenant
      security:
        - oauth2: ["organization:read"]
      responses:
        "200":
          description: Establecimientos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Establishment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createEstablishment
      summary: Crear establecimiento
      security:
        - oauth2: ["organization:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstablishmentInput"
      responses:
        "201":
          description: Establecimiento creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Establishment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /organization/fiscal-settings:
    get:
      operationId: getFiscalSettings
      summary: Consultar ambiente SRI y metadatos seguros de la firma del tenant
      security:
        - oauth2: ["organization:read"]
      responses:
        "200":
          description: Configuracion fiscal sin secretos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiscalSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      operationId: updateFiscalSettings
      summary: Cambiar el ambiente SRI del tenant
      security:
        - oauth2: ["organization:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FiscalSettingsInput"
      responses:
        "200":
          description: Configuracion actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiscalSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /organization/signing-certificate:
    post:
      operationId: uploadSigningCertificate
      summary: Validar y guardar el certificado PKCS12 privado del tenant
      security:
        - oauth2: ["organization:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file, password]
              properties:
                file:
                  type: string
                  format: binary
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Certificado validado y almacenado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiscalSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /emission-points:
    get:
      operationId: listEmissionPoints
      summary: Listar puntos de emision
      security:
        - oauth2: ["organization:read"]
      responses:
        "200":
          description: Puntos de emision
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmissionPoint"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createEmissionPoint
      summary: Crear punto de emision
      security:
        - oauth2: ["organization:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmissionPointInput"
      responses:
        "201":
          description: Punto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmissionPoint"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /tax-categories:
    get:
      operationId: listTaxCategories
      summary: Listar categorias tributarias vigentes
      security:
        - oauth2: ["organization:read"]
      responses:
        "200":
          description: Categorias tributarias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxCategory"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /tags:
    get:
      operationId: listTags
      summary: Listar etiquetas
      security:
        - oauth2: ["tags:read"]
      responses:
        "200":
          description: Etiquetas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createTag
      summary: Crear etiqueta
      security:
        - oauth2: ["tags:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Etiqueta creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /automation/settings:
    get:
      operationId: getAutomationSettings
      summary: Consultar politicas y kill switch
      security:
        - oauth2: ["automation:read"]
      responses:
        "200":
          description: Configuracion efectiva
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      operationId: updateAutomationSettings
      summary: Actualizar politicas y kill switch
      security:
        - oauth2: ["automation:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationSettingsInput"
      responses:
        "200":
          description: Configuracion actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /operations/{operationId}:
    get:
      operationId: getOperation
      summary: Consultar estado de operacion asincrona
      security:
        - oauth2: ["operations:read"]
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Estado y resultado normalizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /parties:
    get:
      operationId: searchParties
      summary: Buscar clientes y proveedores
      security:
        - oauth2: ["parties:read"]
      parameters:
        - name: q
          in: query
          schema:
            type: string
            minLength: 2
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/PartyRole"
      responses:
        "200":
          description: Resultados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Party"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createParty
      summary: Crear cliente/proveedor
      security:
        - oauth2: ["parties:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyInput"
      responses:
        "201":
          description: Contacto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /parties/{partyId}:
    put:
      operationId: updateParty
      summary: Editar cliente/proveedor
      security:
        - oauth2: ["parties:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: partyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyInput"
      responses:
        "200":
          description: Contacto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /products:
    get:
      operationId: searchProducts
      summary: Buscar productos
      security:
        - oauth2: ["products:read"]
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resultados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createProduct
      summary: Crear producto
      security:
        - oauth2: ["products:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /products/{productId}:
    put:
      operationId: updateProduct
      summary: Editar producto
      security:
        - oauth2: ["products:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /invoices:
    get:
      operationId: listInvoices
      summary: Listar facturas y notas de credito del tenant
      security:
        - oauth2: ["invoices:read"]
      parameters:
        - name: q
          in: query
          description: Coincidencia parcial de secuencial o clave de acceso.
          schema:
            type: string
            minLength: 2
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, READY, SIGNED, RECEIVED, PENDING_AUTHORIZATION, AUTHORIZED, NOT_AUTHORIZED, REJECTED, FAILED, VOIDED]
      responses:
        "200":
          description: Resultados (maximo 100)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createInvoiceDraft
      summary: Crear borrador de factura
      security:
        - oauth2: ["invoices:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Borrador
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesDocument"
        "422":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /invoices/{invoiceId}:
    get:
      operationId: getInvoice
      summary: Consultar factura y estado SRI
      security:
        - oauth2: ["invoices:read"]
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Factura
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesDocument"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /invoices/{invoiceId}/issue:
    post:
      operationId: issueInvoice
      summary: Validar, firmar y encolar emision
      security:
        - oauth2: ["invoices:issue"]
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Emision aceptada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /invoices/{invoiceId}/artifacts:
    get:
      operationId: listInvoiceArtifacts
      summary: Listar XML firmado y RIDE PDF del comprobante
      security:
        - oauth2: ["invoices:read"]
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Artefactos privados disponibles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentArtifact"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /invoices/{invoiceId}/artifacts/{artifactId}/download:
    get:
      operationId: createInvoiceArtifactDownload
      summary: Crear una descarga privada de corta duracion
      security:
        - oauth2: ["invoices:read"]
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: URL prefirmada con nombre y formato de descarga
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactDownload"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /credit-notes:
    post:
      operationId: createAndIssueCreditNote
      summary: Crear y encolar nota de credito relacionada
      security:
        - oauth2: ["credit-notes:issue"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditNoteInput"
      responses:
        "202":
          description: Operacion aceptada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /receivables:
    get:
      operationId: listReceivables
      summary: Consultar cartera
      security:
        - oauth2: ["receivables:read"]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, PARTIAL, OVERDUE, SETTLED]
        - name: dueBefore
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Cartera
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /receivables/aging:
    get:
      operationId: getReceivablesAging
      summary: Resumen de aging de cartera por bucket de vencimiento (E5-05)
      description: >-
        Aditivo (Sprint 3 Fase 3). Clasifica el saldo abierto de cada cuota
        por bucket de vencimiento respecto a una fecha de corte local
        (America/Guayaquil). Reproducible: mismos datos + mismo asOf =>
        mismo resultado.
      security:
        - oauth2: ["receivables:read"]
      parameters:
        - name: asOf
          in: query
          description: >-
            Fecha de corte local para el calculo de aging. Por defecto hoy
            en America/Guayaquil; se puede fijar para reproducibilidad en
            pruebas.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Resumen de aging
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgingSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /receivables/{receivableId}:
    get:
      operationId: getReceivable
      summary: Consultar el detalle de un receivable
      security:
        - oauth2: ["receivables:read"]
      parameters:
        - $ref: "#/components/parameters/ReceivableId"
        - name: asOf
          in: query
          description: >-
            Aditivo (Sprint 3 Fase 3). Fecha de corte local para el bucket de
            aging y el status OVERDUE derivado; por defecto hoy en
            America/Guayaquil.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Receivable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Receivable no encontrado
  /receivables/{receivableId}/movements/{movementId}/reversal:
    post:
      operationId: reverseReceivableMovement
      summary: Revertir un movimiento como compensacion auditada (E5-09)
      description: >-
        Aditivo (Sprint 3 Fase 3). Crea un Movement tipo REVERSAL que
        referencia el original via reversedMovementId; el original nunca se
        edita ni se borra. No se puede revertir un REVERSAL ni un movimiento
        ya revertido. No expuesto como tool MCP en este sprint (solo
        REST/UI humana).
      security:
        - oauth2: ["receivables:write"]
      parameters:
        - $ref: "#/components/parameters/ReceivableId"
        - $ref: "#/components/parameters/MovementId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReversalInput"
      responses:
        "201":
          description: Movimiento revertido, saldo actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Receivable o movimiento no encontrado
        "422":
          description: >-
            El movimiento ya fue revertido, o el movimiento es en si mismo
            un REVERSAL
  /receivables/{receivableId}/payments:
    post:
      operationId: recordCustomerPayment
      summary: Registrar y aplicar un cobro
      security:
        - oauth2: ["receivables:write"]
      parameters:
        - $ref: "#/components/parameters/ReceivableId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Cobro registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /receivables/{receivableId}/movements:
    get:
      operationId: listReceivableMovements
      summary: Listar el historial de movimientos de un receivable
      security:
        - oauth2: ["receivables:read"]
      parameters:
        - $ref: "#/components/parameters/ReceivableId"
      responses:
        "200":
          description: Movimientos (cobros, retenciones, descuentos, notas de credito, reversos)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Receivable no encontrado
  /receivables/{receivableId}/reminders:
    post:
      operationId: sendCollectionReminder
      summary: Enviar recordatorio
      security:
        - oauth2: ["receivables:notify"]
      parameters:
        - $ref: "#/components/parameters/ReceivableId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderInput"
      responses:
        "202":
          description: Envio encolado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /payables:
    get:
      operationId: listPayables
      summary: Consultar obligaciones
      security:
        - oauth2: ["payables:read"]
      parameters:
        - name: dueBefore
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Obligaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createPayable
      summary: Crear obligacion manual
      security:
        - oauth2: ["payables:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayableInput"
      responses:
        "201":
          description: Obligacion creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /finance/operational-summary:
    get:
      operationId: getOperationalFinancialSummary
      summary: Resumir facturacion y movimientos de caja; no es estado contable
      security:
        - oauth2: ["finance:read"]
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Resumen operativo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationalSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /payables/from-document:
    post:
      operationId: createPayableFromDocument
      summary: Crear obligacion desde un objeto cargado
      security:
        - oauth2: ["payables:extract"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [documentId]
              properties:
                documentId:
                  type: string
                  format: uuid
      responses:
        "202":
          description: Extraccion encolada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /payables/{payableId}/schedule:
    post:
      operationId: scheduleSupplierPayment
      summary: Programar pago sin mover dinero
      security:
        - oauth2: ["payables:write"]
      parameters:
        - $ref: "#/components/parameters/PayableId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentScheduleInput"
      responses:
        "201":
          description: Pago programado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /payables/{payableId}/payments:
    post:
      operationId: recordSupplierPayment
      summary: Registrar pago ya realizado
      security:
        - oauth2: ["payables:write"]
      parameters:
        - $ref: "#/components/parameters/PayableId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Pago registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.example.invalid/authorize
          tokenUrl: https://auth.example.invalid/token
          scopes:
            context:read: Leer contexto
            parties:read: Leer contactos
            parties:write: Gestionar contactos
            products:read: Leer productos
            products:write: Gestionar productos
            invoices:read: Leer facturas
            invoices:write: Crear y emitir documentos
            invoices:issue: Emitir facturas
            credit-notes:issue: Emitir notas de credito
            receivables:read: Leer cartera
            receivables:write: Registrar cobros y recordatorios
            receivables:notify: Enviar recordatorios
            payables:read: Leer obligaciones
            payables:write: Crear y pagar obligaciones
            payables:extract: Extraer obligaciones desde documentos
            finance:read: Leer resumen financiero
            memberships:read: Leer membresias propias
            service-accounts:read: Leer service accounts
            service-accounts:write: Gestionar service accounts
            organization:read: Leer configuracion de empresa
            organization:write: Gestionar configuracion de empresa
            tags:read: Leer etiquetas
            tags:write: Gestionar etiquetas
            automation:read: Leer politicas de automatizacion
            automation:write: Gestionar politicas y kill switch
            operations:read: Consultar operaciones asincronas
        clientCredentials:
          tokenUrl: https://auth.example.invalid/token
          scopes:
            context:read: Leer contexto
            parties:read: Leer contactos
            parties:write: Gestionar contactos
            products:read: Leer productos
            products:write: Gestionar productos
            invoices:read: Leer facturas
            invoices:write: Crear documentos
            invoices:issue: Emitir facturas
            credit-notes:issue: Emitir notas de credito
            receivables:read: Leer cartera
            receivables:write: Registrar cobros
            receivables:notify: Enviar recordatorios
            payables:read: Leer obligaciones
            payables:write: Gestionar obligaciones y pagos
            payables:extract: Extraer obligaciones
            finance:read: Leer resumen operativo
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReceivableId:
      name: receivableId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MovementId:
      name: movementId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PayableId:
      name: payableId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    NonNegativeDecimal:
      type: string
      pattern: "^[0-9]{1,16}(\\.[0-9]{1,2})?$"
      examples: ["0.00", "125.50"]
    PositiveDecimal:
      type: string
      pattern: "^(?!0+(?:\\.0+)?$)[0-9]{1,16}(?:\\.[0-9]{1,2})?$"
      examples: ["0.01", "125.50"]
    QuantityDecimal:
      type: string
      pattern: "^(?!0+(?:\\.0+)?$)[0-9]{1,12}(?:\\.[0-9]{1,6})?$"
      examples: ["1", "0.500000"]
    UnitPriceDecimal:
      type: string
      pattern: "^[0-9]{1,12}(\\.[0-9]{1,6})?$"
      examples: ["10.123456"]
    Membership:
      type: object
      additionalProperties: false
      required: [tenantId, organizationId, ruc, tenantName, roles, active]
      properties:
        tenantId:
          type: string
          format: uuid
        organizationId:
          type: string
        ruc:
          type: string
          pattern: "^[0-9]{13}$"
        tenantName:
          type: string
        roles:
          type: array
          items:
            type: string
        active:
          type: boolean
    ServiceAccountInput:
      type: object
      additionalProperties: false
      required: [name, scopes, expiresAt]
      properties:
        name:
          type: string
          minLength: 3
        scopes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
    ServiceAccount:
      type: object
      additionalProperties: false
      required: [id, clientId, name, scopes, active, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        active:
          type: boolean
        expiresAt:
          type: string
          format: date-time
    ServiceAccountCreated:
      type: object
      additionalProperties: false
      required: [account, clientSecret]
      properties:
        account:
          $ref: "#/components/schemas/ServiceAccount"
        clientSecret:
          type: string
          description: Se entrega una sola vez y nunca se registra en logs.
    EstablishmentInput:
      type: object
      additionalProperties: false
      required: [code, name, address]
      properties:
        code:
          type: string
          pattern: "^[0-9]{3}$"
        name:
          type: string
        address:
          type: string
    FiscalSettingsInput:
      type: object
      additionalProperties: false
      required: [sriEnvironment]
      properties:
        sriEnvironment:
          type: string
          enum: ["1", "2"]
    FiscalSettings:
      allOf:
        - $ref: "#/components/schemas/FiscalSettingsInput"
        - type: object
          additionalProperties: false
          required: [certificateConfigured]
          properties:
            certificateConfigured:
              type: boolean
            certificateFingerprintSha256:
              type: [string, "null"]
              pattern: "^[0-9A-F]{64}$"
            certificateSubject:
              type: [string, "null"]
            certificateValidFrom:
              type: [string, "null"]
              format: date-time
            certificateValidTo:
              type: [string, "null"]
              format: date-time
            certificateUploadedAt:
              type: [string, "null"]
              format: date-time
    Establishment:
      type: object
      additionalProperties: false
      required: [id, code, name, address, active]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          pattern: "^[0-9]{3}$"
        name:
          type: string
        address:
          type: string
        active:
          type: boolean
    EmissionPointInput:
      type: object
      additionalProperties: false
      required: [establishmentId, code]
      properties:
        establishmentId:
          type: string
          format: uuid
        code:
          type: string
          pattern: "^[0-9]{3}$"
    EmissionPoint:
      type: object
      additionalProperties: false
      required: [id, establishmentId, code, active]
      properties:
        id:
          type: string
          format: uuid
        establishmentId:
          type: string
          format: uuid
        code:
          type: string
          pattern: "^[0-9]{3}$"
        active:
          type: boolean
    TaxCategory:
      type: object
      additionalProperties: false
      required: [id, sriCode, name, rate, validFrom, active]
      properties:
        id:
          type: string
          format: uuid
        sriCode:
          type: string
        name:
          type: string
        rate:
          type: string
          pattern: "^[0-9]{1,3}(\\.[0-9]{1,6})?$"
        validFrom:
          type: string
          format: date
        validTo:
          type: [string, "null"]
          format: date
        active:
          type: boolean
    TagInput:
      type: object
      additionalProperties: false
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
    Tag:
      type: object
      additionalProperties: false
      required: [id, name, color, active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        active:
          type: boolean
    AutomationSettingsInput:
      type: object
      additionalProperties: false
      required: [writesEnabled, dailyAmountLimit]
      properties:
        writesEnabled:
          type: boolean
        dailyAmountLimit:
          $ref: "#/components/schemas/NonNegativeDecimal"
    AutomationSettings:
      type: object
      additionalProperties: false
      required: [writesEnabled, dailyAmountLimit, updatedAt]
      properties:
        writesEnabled:
          type: boolean
        dailyAmountLimit:
          $ref: "#/components/schemas/NonNegativeDecimal"
        updatedAt:
          type: string
          format: date-time
    PartyRole:
      type: string
      enum: [CUSTOMER, SUPPLIER]
    TenantContext:
      type: object
      additionalProperties: false
      required: [tenantId, ruc, name, roles, scopes, automationWritesEnabled]
      properties:
        tenantId:
          type: string
          format: uuid
        ruc:
          type: string
          pattern: "^[0-9]{13}$"
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        automationWritesEnabled:
          type: boolean
    PartyInput:
      type: object
      additionalProperties: false
      required: [name, identificationType, identificationNumber, roles]
      properties:
        name:
          type: string
          minLength: 1
        identificationType:
          type: string
          enum: [RUC, CEDULA, PASSPORT, FINAL_CONSUMER]
        identificationNumber:
          type: string
        roles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/PartyRole"
        email:
          type: [string, "null"]
          format: email
        phone:
          type: [string, "null"]
        address:
          type: [string, "null"]
    Party:
      type: object
      additionalProperties: false
      required: [id, name, identificationType, identificationNumber, roles]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        identificationType:
          type: string
          enum: [RUC, CEDULA, PASSPORT, FINAL_CONSUMER]
        identificationNumber:
          type: string
        roles:
          type: array
          items:
            $ref: "#/components/schemas/PartyRole"
        email:
          type: [string, "null"]
          format: email
        phone:
          type: [string, "null"]
        address:
          type: [string, "null"]
    ProductInput:
      type: object
      additionalProperties: false
      required: [name, unitPrice, taxCode]
      properties:
        name:
          type: string
        code:
          type: [string, "null"]
        unitPrice:
          $ref: "#/components/schemas/UnitPriceDecimal"
        taxCode:
          type: string
    Product:
      type: object
      additionalProperties: false
      required: [id, name, unitPrice, taxCode]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: [string, "null"]
        unitPrice:
          $ref: "#/components/schemas/UnitPriceDecimal"
        taxCode:
          type: string
    InvoiceLineInput:
      type: object
      additionalProperties: false
      required: [description, quantity, unitPrice, taxCode]
      properties:
        productId:
          type: [string, "null"]
          format: uuid
        description:
          type: string
        quantity:
          $ref: "#/components/schemas/QuantityDecimal"
        unitPrice:
          $ref: "#/components/schemas/UnitPriceDecimal"
        discount:
          $ref: "#/components/schemas/NonNegativeDecimal"
        taxCode:
          type: string
    InvoiceInput:
      type: object
      additionalProperties: false
      required: [customerId, establishmentId, emissionPointId, issueDate, installments, lines]
      properties:
        customerId:
          type: string
          format: uuid
        establishmentId:
          type: string
          format: uuid
        emissionPointId:
          type: string
          format: uuid
        issueDate:
          type: string
          format: date
        installments:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InstallmentInput"
        lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InvoiceLineInput"
    CreditNoteInput:
      type: object
      additionalProperties: false
      required: [invoiceId, reason, lines]
      properties:
        invoiceId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 3
        lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InvoiceLineInput"
    SalesDocument:
      type: object
      additionalProperties: false
      required: [id, type, status, sequential, issueDate, subtotal, tax, total]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [INVOICE, CREDIT_NOTE]
        status:
          type: string
          enum: [DRAFT, READY, SIGNED, RECEIVED, PENDING_AUTHORIZATION, AUTHORIZED, NOT_AUTHORIZED, REJECTED, FAILED, VOIDED]
        sequential:
          type: string
          pattern: "^[0-9]{9}$"
        issueDate:
          type: string
          format: date
        accessKey:
          type: [string, "null"]
          pattern: "^[0-9]{49}$"
        subtotal:
          $ref: "#/components/schemas/NonNegativeDecimal"
        tax:
          $ref: "#/components/schemas/NonNegativeDecimal"
        total:
          $ref: "#/components/schemas/NonNegativeDecimal"
        currency:
          type: string
          const: USD
        partyId:
          type: string
          format: uuid
        establishmentId:
          type: string
          format: uuid
        emissionPointId:
          type: string
          format: uuid
        fiscalPolicyVersion:
          type: string
        reason:
          type: [string, "null"]
        authorizationNumber:
          type: [string, "null"]
        authorizedAt:
          type: [string, "null"]
          format: date-time
        sriTransmission:
          anyOf:
            - $ref: "#/components/schemas/SRITransmission"
            - type: "null"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/SalesDocumentLine"
    SRITransmission:
      type: object
      additionalProperties: false
      required: [status, lastAttemptAt]
      properties:
        status:
          type: string
          enum: [PENDING, RECEIVED, PENDING_AUTHORIZATION, AUTHORIZED, NOT_AUTHORIZED, REJECTED, FAILED]
        message:
          type: [string, "null"]
        lastAttemptAt:
          type: string
          format: date-time
        authorizationNumber:
          type: [string, "null"]
    SalesDocumentLine:
      type: object
      additionalProperties: false
      required: [id, lineNumber, description, quantity, unitPrice, discount, baseAmount, taxCode, taxRate, taxAmount]
      properties:
        id:
          type: string
          format: uuid
        lineNumber:
          type: integer
        productId:
          type: [string, "null"]
          format: uuid
        description:
          type: string
        quantity:
          $ref: "#/components/schemas/QuantityDecimal"
        unitPrice:
          $ref: "#/components/schemas/UnitPriceDecimal"
        discount:
          $ref: "#/components/schemas/NonNegativeDecimal"
        baseAmount:
          $ref: "#/components/schemas/NonNegativeDecimal"
        taxCode:
          type: string
        taxRate:
          type: string
        taxAmount:
          $ref: "#/components/schemas/NonNegativeDecimal"
    DocumentArtifact:
      type: object
      additionalProperties: false
      required: [id, artifactType, sha256, version, createdAt]
      properties:
        id:
          type: string
          format: uuid
        artifactType:
          type: string
          enum: [xml-signed, ride-pdf]
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        version:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
    ArtifactDownload:
      type: object
      additionalProperties: false
      required: [downloadUrl, expiresInSeconds, fileName]
      properties:
        downloadUrl:
          type: string
          format: uri
        expiresInSeconds:
          type: integer
          minimum: 1
        fileName:
          type: string
    AccountItem:
      type: object
      additionalProperties: false
      required: [id, partyId, status, originalAmount, openAmount, currency]
      properties:
        id:
          type: string
          format: uuid
        partyId:
          type: string
          format: uuid
        status:
          type: string
          enum: [OPEN, PARTIAL, OVERDUE, SETTLED, VOIDED]
        originalAmount:
          $ref: "#/components/schemas/NonNegativeDecimal"
        openAmount:
          $ref: "#/components/schemas/NonNegativeDecimal"
        currency:
          type: string
          const: USD
        dueDate:
          type: [string, "null"]
          format: date
        aging:
          description: >-
            Aditivo (Sprint 3 Fase 3, E5-05). Bucket de mora del receivable
            (el peor entre sus cuotas abiertas); null/omitido si no hay
            cuotas abiertas en mora.
          oneOf:
            - $ref: "#/components/schemas/Aging"
            - type: "null"
    PaymentInput:
      type: object
      additionalProperties: false
      description: La suma de cashAmount, retentions y discounts debe ser mayor que cero y no superar el saldo.
      required: [cashAmount, paymentDate, retentions, discounts]
      properties:
        cashAmount:
          $ref: "#/components/schemas/NonNegativeDecimal"
        paymentDate:
          type: string
          format: date
        method:
          type: [string, "null"]
          enum: [TRANSFER, CHECK, CASH, CARD, OTHER, null]
        reference:
          type: [string, "null"]
        retentions:
          type: array
          items:
            $ref: "#/components/schemas/RetentionInput"
        discounts:
          type: array
          items:
            $ref: "#/components/schemas/DiscountInput"
    RetentionInput:
      type: object
      additionalProperties: false
      required: [kind, amount, reason]
      properties:
        kind:
          type: string
          enum: [RETENTION_IVA, RETENTION_RENTA, OTHER]
        amount:
          $ref: "#/components/schemas/PositiveDecimal"
        reason:
          type: string
          minLength: 3
        documentReference:
          type: [string, "null"]
    DiscountInput:
      type: object
      additionalProperties: false
      required: [amount, reason]
      properties:
        amount:
          $ref: "#/components/schemas/PositiveDecimal"
        reason:
          type: string
          minLength: 3
    Movement:
      type: object
      additionalProperties: false
      description: Aplicacion sobre una cuota de un receivable (cobro, retencion, descuento, nota de credito o reverso).
      required: [id, receivableId, installmentId, movementType, amount, actorId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        receivableId:
          type: string
          format: uuid
        installmentId:
          type: string
          format: uuid
        movementType:
          type: string
          enum: [PAYMENT, RETENTION, DISCOUNT, CREDIT_NOTE, REVERSAL]
        amount:
          $ref: "#/components/schemas/NonNegativeDecimal"
        supportReference:
          type: [string, "null"]
        reversedMovementId:
          type: [string, "null"]
          format: uuid
        actorId:
          type: string
        createdAt:
          type: string
          format: date-time
    ReversalInput:
      type: object
      additionalProperties: false
      description: >-
        Aditivo (Sprint 3 Fase 3, E5-09). El motivo es obligatorio y queda
        auditado junto con el movimiento original revertido.
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
    Aging:
      type: object
      additionalProperties: false
      description: >-
        Aditivo (Sprint 3 Fase 3, E5-05). Bucket de mora fijo y determinista
        respecto a una fecha de corte local (America/Guayaquil).
      required: [bucket, daysOverdue]
      properties:
        bucket:
          type: string
          enum: [CURRENT, "1-15", "16-30", "31-60", "61-90", "90+"]
        daysOverdue:
          type: integer
          minimum: 0
    AgingBucketTotal:
      type: object
      additionalProperties: false
      required: [bucket, total, installmentCount]
      properties:
        bucket:
          type: string
          enum: [CURRENT, "1-15", "16-30", "31-60", "61-90", "90+"]
        total:
          $ref: "#/components/schemas/NonNegativeDecimal"
        installmentCount:
          type: integer
          minimum: 0
    PartyAgingBucketTotal:
      type: object
      additionalProperties: false
      required: [partyId, bucket, total, installmentCount]
      properties:
        partyId:
          type: string
          format: uuid
        bucket:
          type: string
          enum: [CURRENT, "1-15", "16-30", "31-60", "61-90", "90+"]
        total:
          $ref: "#/components/schemas/NonNegativeDecimal"
        installmentCount:
          type: integer
          minimum: 0
    AgingSummary:
      type: object
      additionalProperties: false
      description: >-
        Aditivo (Sprint 3 Fase 3, E5-05). Resumen de aging por tenant,
        calculado on-demand sobre las cuotas abiertas; reproducible con la
        misma fecha de corte (asOf).
      required: [asOf, buckets, byParty]
      properties:
        asOf:
          type: string
          format: date
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/AgingBucketTotal"
        byParty:
          type: array
          items:
            $ref: "#/components/schemas/PartyAgingBucketTotal"
    InstallmentInput:
      type: object
      additionalProperties: false
      required: [dueDate, amount]
      properties:
        dueDate:
          type: string
          format: date
        amount:
          $ref: "#/components/schemas/PositiveDecimal"
    ReminderInput:
      type: object
      additionalProperties: false
      required: [channel, templateId]
      properties:
        channel:
          type: string
          enum: [EMAIL, WHATSAPP]
        templateId:
          type: string
          format: uuid
    PayableInput:
      type: object
      additionalProperties: false
      required: [supplierId, documentType, establishment, emissionPoint, sequential, issueDate, installments, total]
      properties:
        supplierId:
          type: string
          format: uuid
        documentType:
          type: string
          enum: [INVOICE, LIQUIDATION, DEBIT_NOTE, OTHER]
        establishment:
          type: string
          pattern: "^[0-9]{3}$"
        emissionPoint:
          type: string
          pattern: "^[0-9]{3}$"
        sequential:
          type: string
          pattern: "^[0-9]{9}$"
        accessKey:
          type: [string, "null"]
          pattern: "^[0-9]{49}$"
        issueDate:
          type: string
          format: date
        installments:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InstallmentInput"
        total:
          $ref: "#/components/schemas/PositiveDecimal"
    PaymentScheduleInput:
      type: object
      additionalProperties: false
      required: [scheduledDate, amount, priority]
      properties:
        scheduledDate:
          type: string
          format: date
        amount:
          $ref: "#/components/schemas/PositiveDecimal"
        priority:
          type: string
          enum: [LOW, NORMAL, HIGH, CRITICAL]
    Operation:
      type: object
      additionalProperties: false
      required: [operationId, status, correlationId, createdAt, expiresAt]
      properties:
        operationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACCEPTED, RUNNING, SUCCEEDED, FAILED, BLOCKED]
        correlationId:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        result:
          type: [object, "null"]
          additionalProperties: true
        error:
          anyOf:
            - $ref: "#/components/schemas/Error"
            - type: "null"
    OperationalSummary:
      type: object
      additionalProperties: false
      description: Metricas operativas por fechas de emision y movimiento; no aplica devengo contable.
      required: [from, to, invoiced, credited, collected, paid, receivableOpen, payableOpen]
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        invoiced:
          $ref: "#/components/schemas/NonNegativeDecimal"
        credited:
          $ref: "#/components/schemas/NonNegativeDecimal"
        collected:
          $ref: "#/components/schemas/NonNegativeDecimal"
        paid:
          $ref: "#/components/schemas/NonNegativeDecimal"
        receivableOpen:
          $ref: "#/components/schemas/NonNegativeDecimal"
        payableOpen:
          $ref: "#/components/schemas/NonNegativeDecimal"
    Error:
      type: object
      additionalProperties: false
      required: [code, message, correlationId]
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
  responses:
    Unauthorized:
      description: Token ausente, invalido o sin contexto autorizado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Scope, rol, politica o membresia insuficiente
      headers:
        WWW-Authenticate:
          schema:
            type: string
          description: Bearer error con scope requerido cuando aplique
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: No encontrado o no visible en el tenant
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflicto de estado, duplicado o idempotencia
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Datos invalidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
